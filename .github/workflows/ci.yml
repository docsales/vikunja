name: ci

env:
  DO_NOT_TRACK: 1

on:
  pull_request:
  merge_group:
  push:
    tags:
      - v*
    branches:
      - main

# Least-privilege default for the GITHUB_TOKEN. test.yml's jobs only check
# out code, build, and exchange workflow artifacts, so contents: read
# covers the whole reusable workflow. release.yml needs more (it pushes
# Docker images and creates GitHub releases), so that job overrides this
# below with exactly what it needs.
permissions:
  contents: read

concurrency:
  # main merges use a unique run_id so they don't cancel each other
  # other branches or PRs share a group to auto-cancel old runs
  group: ${{ github.ref == 'refs/heads/main' &&
    format('{0}-{1}', github.workflow, github.run_id) ||
    format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release:
    name: Release
    if: ${{ (github.ref_type == 'tag' || github.ref_name == 'main') && github.repository == 'go-vikunja/vikunja' }}
    uses: ./.github/workflows/release.yml
    needs:
      - test
    # release.yml's docker job pushes images to ghcr.io using secrets.GITHUB_TOKEN
    # (packages: write), and its generate-swagger-docs / create-release jobs push
    # commits and create a GitHub release (contents: write). Job-level permissions
    # inside the called workflow can only narrow this ceiling, never exceed it, so
    # both scopes must be granted here.
    permissions:
      contents: write
      packages: write
    secrets: inherit
