name: "CodeQL config"

paths-ignore:
  - "**/node_modules/**"
  - "frontend/dist/**"
  - "frontend/dist-dev/**"
  - "desktop/dist/**"
  - "desktop/frontend/**"
  - "**/*.min.js"
